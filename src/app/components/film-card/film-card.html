<a [routerLink]="['/films', film().id]" class="film-card__link">
  <img [src]="film().posterUrl" [alt]="film().title" />
  <h2>{{ film().title }}</h2>
  <p>{{ film().year }}</p>
  <p>{{ film().genre }}</p>
  <p>{{ film().rating }}</p>
</a>
<button (click)="onToggleFavorite()" class="favorite-btn">
  {{ film().isFavorite ? '❤️' : '🩶' }}
</button>
