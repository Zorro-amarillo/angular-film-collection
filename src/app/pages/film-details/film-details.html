<div class="film-details">
  <img [src]="currentFilm?.posterUrl" [alt]="currentFilm?.title" />
  <h2>{{ currentFilm?.title }}</h2>
  <p>Year: {{ currentFilm?.year }}</p>
  <p>Genre: {{ currentFilm?.genre }}</p>
  <p>Rating: {{ currentFilm?.rating }}</p>
  <p>Duration: {{ currentFilm?.duration | duration }}</p>
  <p>Description: {{ currentFilm?.description }}</p>
</div>
